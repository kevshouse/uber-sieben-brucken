name: Seven Bridges Integration Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    # This is where we spin up the Neo4j "Shore"
    services:
      neo4j:
        image: neo4j:latest
        env:
          NEO4J_AUTH: neo4j/password123
        ports:
          - 7687:7687
          - 7474:7474
        # Wait for the database to be healthy before starting tests
        options: >-
          --health-cmd "cypher-shell -u neo4j -p password123 'RETURN 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26' # Matching your go.mod

      - name: Install Dependencies
        run: go mod tidy

      - name: Run Integration Tests
        run: go test -v ./internal/adapter/...